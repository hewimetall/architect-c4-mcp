name: wasm_c4_viewer
description: |
  Use the WASM C4 canvas viewer (WebGPU detect → Canvas2D draw) and All-layers mode.
  Cascade: navigator.gpu → WebGPU path acknowledgement → Canvas2D render.
arguments:
  - name: focus
    required: false
    description: Container or system id to focus in mode=all
template: |
  Open architect-c4 WASM / All-layers view.

  URLs:
  - All layers (Mermaid): /?mode=all
  - All layers (WASM): /?mode=all&renderer=wasm{{#if focus}}&focus={{focus}}{{/if}}
  - Cascade note: preferred_backend() returns webgpu|canvas2d; draw uses Canvas2D until wgpu mesh lands.

  GraphQL batch:
  {
    scene: architectC4 { getScene(mode: "all"{{#if focus}}, focus: "{{focus}}"{{/if}}) { json } }
    links: architectC4 { getViewLinks { json } }
  }
