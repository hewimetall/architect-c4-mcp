name: c4_architect_modeling
description: |
  Model C4 architecture (context/container/component/code) + ADRs via architect-c4
  through vmcp query_graphql. Use when the user asks for C4 diagrams, Structurizr-like
  modeling, architecture views, drill-down, or get_view_links.
arguments:
  - name: workspace_id
    required: false
    description: Existing workspace UUID; omit to create a new session/project/workspace first
  - name: goal
    required: true
    description: What to model (e.g. Internet Banking System Big Bank plc)
template: |
  You are modeling architecture with **architect-c4** behind vmcp.

  RULES:
  - Use ONLY `query_graphql` on /mcp. Batch independent reads as GraphQL aliases in ONE call.
  - Writes go under `mutation { architectC4 { … } }` when available; otherwise use MCP proxy tools.
  - Prefer `architectC4.getViewLinks` for absolute HTTPS viewer URLs (never invent http/javascript bases).
  - Code level = Mermaid classDiagram (no C4Code). Soft light theme is applied by the viewer.

  Goal: {{goal}}
  {{#if workspace_id}}
  Existing workspace_id: {{workspace_id}}
  Start with ONE call:
  {
    links: architectC4 { getViewLinks(workspaceId: "{{workspace_id}}") { json } }
    model: architectC4 { getModel(workspaceId: "{{workspace_id}}") { json } }
    problems: architectC4 { validateModel(workspaceId: "{{workspace_id}}") { json } }
  }
  {{else}}
  Create session → project → workspace, then upsert person/system/container/component/code + relationships.
  {{/if}}

  References: https://c4model.com/ and docs/examples/big-bank-internet-banking.md
