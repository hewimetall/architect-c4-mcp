---
name: CI
on:
  push:
    branches: [main, "cursor/**"]
  pull_request:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test-py:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: llvm-tools-preview

      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: architect-c4-py

      - name: Sync + build native
        run: |
          set -euo pipefail
          uv sync --extra dev
          mkdir -p .libs
          ln -sf /usr/lib/x86_64-linux-gnu/libpython3.12.so.1.0 .libs/libpython3.12.so
          export LIBRARY_PATH="$PWD/.libs:${LIBRARY_PATH:-}"
          export LD_LIBRARY_PATH="$PWD/.libs:${LD_LIBRARY_PATH:-}"
          uv run maturin develop

      - name: Pytest
        run: uv run pytest -q

      - name: Python coverage (median ≥ 93%)
        run: chmod +x scripts/*.sh && ./scripts/python-coverage.sh

  test-rust:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: llvm-tools-preview

      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: architect-c4-rust

      - name: Install cargo-llvm-cov
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-llvm-cov

      - name: Rust unit tests
        run: cargo test --workspace --exclude architect-c4-app

      - name: Rust coverage (median ≥ 93%)
        run: chmod +x scripts/*.sh && ./scripts/rust-coverage.sh

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: architect-c4-lint

      - name: Sync Python tools
        run: uv sync --extra dev

      - name: Ruff
        run: uv run ruff check python tests

      - name: Rust fmt
        run: cargo fmt --all -- --check

      - name: Clippy (pure crates)
        run: |
          set -euo pipefail
          for d in \
            packages/architect-c4-domain \
            packages/architect-c4-revision \
            packages/architect-c4-session \
            packages/architect-c4-model \
            packages/architect-c4-git \
            packages/architect-c4-adr \
            packages/architect-c4-flow \
            packages/architect-c4-queue \
            packages/architect-c4-tomlio \
            packages/architect-c4-validate \
            packages/architect-c4-scene \
            packages/architect-c4-render \
            packages/architect-c4-wasm
          do
            (cd "$d" && cargo clippy --all-targets -- -D warnings)
          done

  docker-build:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Build sidecar image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          tags: architect-c4-mcp:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

